services:
  backend:
    build: ./backend
    command: sh -c "python manage.py migrate --noinput && celery -A sightline worker --loglevel=info --concurrency=1 & python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    dns:
      - 8.8.8.8

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
