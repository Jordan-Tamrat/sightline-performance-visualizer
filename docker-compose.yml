services:
  backend:
    build: ./backend
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on: []
    dns:
      - 8.8.8.8

  celery_worker:
    build: ./backend
    command: celery -A sightline worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    shm_size: '2gb'
    depends_on:
      - backend
    dns:
      - 8.8.8.8

  celery_beat:
    build: ./backend
    command: celery -A sightline beat -l info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - backend
    dns:
      - 8.8.8.8


  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend

volumes:
  postgres_data:
